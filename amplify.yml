version: 1
backend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
env:
  variables:
    NEXT_PUBLIC_API_URL: https://somaaibackend.fly.dev
    NEXTAUTH_URL: https://somaaibackend.fly.dev
    NEXT_PUBLIC_GOOGLE_CLIENT_ID: YOUR_GOOGLE_CLIENT_ID_HERE
    GOOGLE_CLIENT_SECRET: YOUR_GOOGLE_CLIENT_SECRET_HERE
